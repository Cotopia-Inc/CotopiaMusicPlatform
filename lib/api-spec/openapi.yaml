          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      operationId: postChatMessage
      tags: [chat]
      summary: Post a chat message
      security:
        - bearerAuth: []
      parameters:
        - name: contentType
          in: path
          required: true
          schema:
            type: string
            enum: [song, video]
        - name: contentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"
        "401":
          description: Unauthorized

  /payments/capture:
    post:
      operationId: capturePayment
      tags: [payments]
      summary: Capture a PayPal demo payment and move submission to pending_review
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentCaptureInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Submission"
        "404":
          description: Not found

  /payments/initiate:
    post:
      operationId: initiatePayment
      tags: [payments]
      summary: Initiate a PayPal payment for submission fee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInitiateInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResponse"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Auth ────────────────────────────────────────────────────────────────
    RegisterInput:
      type: object
      required: [email, password, username, role]
      properties:
        email:
          type: string
        password:
          type: string
        username:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum: [listener, artist, label, business]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, email, username, role, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        username:
          type: string
        displayName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        bannerUrl:
          type: ["string", "null"]
        profileVideoUrl:
          type: ["string", "null"]
        role:
          type: string
          enum: [listener, artist, label, business, admin, moderator, editor, master_admin]
        isActive:
          type: boolean
        isVerified:
          type: boolean
        isSuspended:
          type: boolean
        createdAt:
          type: string

    PublicUser:
      type: object
      required: [id, username, role, isVerified, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        role:
          type: string
        isVerified:
          type: boolean
        createdAt:
          type: string
        artistId:
          type: ["integer", "null"]

    UserUpdate:
      type: object
      properties:
        displayName:
          type: string
        avatarUrl:
          type: string
        bio:
          type: string
        bannerUrl:
          type: string
        profileVideoUrl:
          type: string

    SendOtpInput:
      type: object
      required: [purpose]
      properties:
        purpose:
          type: string
          enum: [verify_email, change_email]
        newEmail:
          type: string

    VerifyOtpInput:
      type: object
      required: [code, purpose]
      properties:
        code:
          type: string
        purpose:
          type: string
          enum: [verify_email, change_email]
        newEmail:
          type: string

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string

    ChangeUsernameInput:
      type: object
      required: [username]
      properties:
        username:
          type: string

    DemographicsInput:
      type: object
      required: [realName, address, city, state, country, postalCode, sex, race, dateOfBirth, phone]
      properties:
        realName:
          type: string
          minLength: 1
        address:
          type: string
          minLength: 1
        city:
          type: string
          minLength: 1
        state:
          type: string
          minLength: 1
        country:
          type: string
          minLength: 1
        postalCode:
          type: string
          minLength: 1
        sex:
          type: string
          minLength: 1
        race:
          type: string
          minLength: 1
        dateOfBirth:
          type: string
          minLength: 1
        phone:
          type: string
          minLength: 1

    # ── Songs ───────────────────────────────────────────────────────────────
    Song:
      type: object
      required: [id, title, artistId, artistName, duration, status, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        artistId:
          type: integer
        artistUserId:
          type: ["integer", "null"]
        artistName:
          type: string
        artistUserRole:
          type: ["string", "null"]
        artistIsVerified:
          type: boolean
        albumId:
          type: ["integer", "null"]
        albumName:
          type: ["string", "null"]
        genre:
          type: ["string", "null"]
        duration:
          type: integer
        coverUrl:
          type: ["string", "null"]
        streamUrl:
          type: ["string", "null"]
        playCount:
          type: integer
        avgRating:
          type: ["number", "null"]
        status:
          type: string
          enum: [draft, pending_review, approved, rejected, published]
        releaseType:
          type: string
          enum: [single, ep, album]
        isFeatured:
          type: boolean
        credits:
          type: ["string", "null"]
        createdAt:
          type: string

    SongDetail:
      allOf:
        - $ref: "#/components/schemas/Song"
        - type: object
          properties:
            commentCount:
              type: integer
            userRating:
              type: ["integer", "null"]
            isFavorited:
              type: boolean

    SongInput:
      type: object
      required: [title, duration]
      properties:
        title:
          type: string
        albumId:
          type: integer
        genre:
          type: string
        duration:
          type: integer
        coverUrl:
          type: string
        streamUrl:
          type: string
        lyrics:
          type: string
        credits:
          type: string

    SongUpdate:
      type: object
      properties:
        title:
          type: string
        genre:
          type: string
        coverUrl:
          type: string
        streamUrl:
          type: string
        lyrics:
          type: string
        credits:
          type: string
        isFeatured:
          type: boolean
        status:
          type: string
          enum: [published, unpublished, draft]

    SongList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Song"
        total:
          type: integer

    # ── Videos ──────────────────────────────────────────────────────────────
    Video:
      type: object
      required: [id, title, artistId, artistName, duration, status, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        artistId:
          type: integer
        artistUserId:
          type: ["integer", "null"]
        artistName:
          type: string
        artistUserRole:
          type: ["string", "null"]
        artistIsVerified:
          type: boolean
        genre:
          type: ["string", "null"]
        duration:
          type: integer
        thumbnailUrl:
          type: ["string", "null"]
        videoUrl:
          type: ["string", "null"]
        viewCount:
          type: integer
        avgRating:
          type: ["number", "null"]
        status:
          type: string
          enum: [draft, pending_review, approved, rejected, published]
        isFeatured:
          type: boolean
        credits:
          type: ["string", "null"]
        createdAt:
          type: string

    VideoDetail:
      allOf:
        - $ref: "#/components/schemas/Video"
        - type: object
          properties:
            commentCount:
              type: integer
            userRating:
              type: ["integer", "null"]
            isFavorited:
              type: boolean
            description:
              type: ["string", "null"]

    VideoInput:
      type: object
      required: [title, duration]
      properties:
        title:
          type: string
        genre:
          type: string
        duration:
          type: integer
        thumbnailUrl:
          type: string
        videoUrl:
          type: string
        description:
          type: string
        credits:
          type: string

    VideoUpdate:
      type: object
      properties:
        title:
          type: string
        genre:
          type: string
        thumbnailUrl:
          type: string
        videoUrl:
          type: string
        description:
          type: string
        credits:
          type: string
        isFeatured:
          type: boolean
        status:
          type: string
          enum: [published, unpublished, draft]

    VideoList:
      type: object
      required: [items, total]
