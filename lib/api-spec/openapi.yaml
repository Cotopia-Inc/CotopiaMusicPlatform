        bio:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        bannerUrl:
          type: ["string", "null"]
        genre:
          type: ["string", "null"]
        followerCount:
          type: integer
        songCount:
          type: integer
        isFollowed:
          type: boolean
        isVerified:
          type: boolean
        createdAt:
          type: string

    ArtistProfile:
      allOf:
