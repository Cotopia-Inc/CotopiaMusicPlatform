          type: string
        bio:
          type: string
        logoUrl:
          type: string
        bannerUrl:
          type: string

    # ── Playlists ────────────────────────────────────────────────────────────
    Playlist:
      type: object
      required: [id, userId, name, isPublic, songCount, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        coverUrl:
          type: ["string", "null"]
        isPublic:
          type: boolean
        songCount:
          type: integer
        createdAt:
          type: string

    PlaylistDetail:
      allOf:
        - $ref: "#/components/schemas/Playlist"
        - type: object
          properties:
            songs:
              type: array
              items:
                $ref: "#/components/schemas/Song"

    PlaylistInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        isPublic:
          type: boolean

    PlaylistUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        coverUrl:
          type: string
        isPublic:
          type: boolean

    PlaylistSongInput:
      type: object
      required: [songId]
      properties:
        songId:
          type: integer

    # ── Chat ─────────────────────────────────────────────────────────────────
    ChatMessage:
      type: object
      required: [id, userId, username, contentType, contentId, message, createdAt, isVerified]
      properties:
        id:
          type: integer
        userId:
          type: integer
        username:
          type: string
        avatarUrl:
          type: ["string", "null"]
        isVerified:
          type: boolean
        role:
          type: ["string", "null"]
        artistId:
          type: ["integer", "null"]
        contentType:
          type: string
          enum: [song, video]
        contentId:
          type: integer
        message:
          type: string
        createdAt:
          type: string

    AdminChatMessage:
      type: object
      required: [id, userId, username, contentType, contentId, message, createdAt, isVerified]
      properties:
        id:
          type: integer
        userId:
          type: integer
        username:
          type: string
        avatarUrl:
          type: ["string", "null"]
        isVerified:
          type: boolean
        role:
          type: ["string", "null"]
        artistId:
          type: ["integer", "null"]
        contentType:
          type: string
        contentId:
          type: integer
        message:
          type: string
        createdAt:
          type: string

    ChatMessageInput:
      type: object
      required: [message]
      properties:
