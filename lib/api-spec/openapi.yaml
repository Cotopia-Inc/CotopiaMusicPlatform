          type: string

    # ── Comments ─────────────────────────────────────────────────────────────
    Comment:
      type: object
      required: [id, userId, username, content, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        username:
          type: string
        avatarUrl:
          type: ["string", "null"]
        content:
