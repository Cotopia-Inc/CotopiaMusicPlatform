        artistName:
          type: string
        labelName:
          type: string
        genre:
          type: string
        mood:
          type: string
        description:
          type: string
        credits:
          type: string
        fileUrl:
          type: string
        coverUrl:
          type: string
        releaseDate:
          type: string
        isExplicit:
          type: boolean

    BulkSubmissionInput:
      type: object
      required: [type, plan, files]
      properties:
        type:
          type: string
          enum: [song, video]
        plan:
          type: string
          enum: [single, basic, premium]
          default: basic
        artistName:
          type: string
        labelName:
          type: string
        genre:
          type: string
        mood:
          type: string
        description:
          type: string
        credits:
          type: string
        coverUrl:
          type: string
        releaseDate:
          type: string
        isExplicit:
          type: boolean
          default: false
        files:
          type: array
          minItems: 1
          items:
            type: object
            required: [title, fileUrl]
            properties:
              title:
                type: string
              fileUrl:
                type: string

    SubmissionUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [draft, pending_review, approved, rejected, published]
        adminNotes:
          type: string

    # ── Library ───────────────────────────────────────────────────────────────
    HistoryItem:
      type: object
      required: [id, type, contentId, contentTitle, playedAt]
      properties:
