        type:
          type: string
          enum: [song, video]
        contentId:
          type: integer
        contentTitle:
          type: string
        coverUrl:
          type: ["string", "null"]
        artistName:
          type: ["string", "null"]
        playedAt:
          type: string

    # ── Home Feed ─────────────────────────────────────────────────────────────
    HomeFeed:
      type: object
      required: [featuredSongs, featuredVideos, featuredArtists, featuredLabels, trendingSongs, newReleases, announcements, editorPicks]
      properties:
        featuredSongs:
          type: array
          items:
            $ref: "#/components/schemas/Song"
        featuredVideos:
          type: array
          items:
            $ref: "#/components/schemas/Video"
        featuredArtists:
          type: array
          items:
            $ref: "#/components/schemas/Artist"
        featuredLabels:
          type: array
          items:
            $ref: "#/components/schemas/Label"
        trendingSongs:
          type: array
          items:
            $ref: "#/components/schemas/Song"
        newReleases:
          type: array
          items:
            $ref: "#/components/schemas/Song"
        announcements:
          type: array
          items:
            $ref: "#/components/schemas/CompanyPost"
        editorPicks:
          type: array
          items:
            $ref: "#/components/schemas/EditorPickExpanded"

    # ── Discover ──────────────────────────────────────────────────────────────
    DiscoverFeed:
      type: object
      required: [trendingSongs, trendingVideos, topRatedSongs, mostDiscussed, newArtists, newLabels, featuredSongs, featuredVideos]
      properties:
        featuredSongs:
          type: array
          items:
            $ref: "#/components/schemas/Song"
        featuredVideos:
          type: array
          items:
            $ref: "#/components/schemas/Video"
        trendingSongs:
          type: array
          items:
            $ref: "#/components/schemas/Song"
        trendingVideos:
          type: array
          items:
            $ref: "#/components/schemas/Video"
        topRatedSongs:
          type: array
          items:
            $ref: "#/components/schemas/Song"
        mostDiscussed:
          type: array
          items:
            $ref: "#/components/schemas/Song"
        newArtists:
          type: array
          items:
            $ref: "#/components/schemas/Artist"
        newLabels:
          type: array
          items:
            $ref: "#/components/schemas/Label"

    # ── Company Posts ─────────────────────────────────────────────────────────
    CompanyPost:
      type: object
      required: [id, title, type, content, isPinned, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
          enum: [announcement, video, product_update, artist_spotlight, label_spotlight, campaign]
        content:
          type: string
        imageUrl:
          type: ["string", "null"]
        videoUrl:
          type: ["string", "null"]
        isPinned:
          type: boolean
        createdAt:
          type: string

    CompanyPostInput:
      type: object
      required: [title, type, content]
      properties:
        title:
          type: string
        type:
          type: string
          enum: [announcement, video, product_update, artist_spotlight, label_spotlight, campaign]
        content:
          type: string
        imageUrl:
          type: string
        videoUrl:
          type: string
        isPinned:
          type: boolean

    CompanyPostUpdate:
      type: object
      properties:
        title:
          type: string
        type:
          type: string
          enum: [announcement, video, product_update, artist_spotlight, label_spotlight, campaign]
        content:
          type: string
        imageUrl:
          type: string
        videoUrl:
          type: string
        isPinned:
          type: boolean

    # ── Admin ─────────────────────────────────────────────────────────────────
    AdminUserList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer

    AdminUserUpdate:
      type: object
      properties:
        role:
          type: string
          enum: [listener, artist, label, business, admin, moderator, editor, master_admin]
        isActive:
          type: boolean
        isVerified:
