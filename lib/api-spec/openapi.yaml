        stageName:
          type: string
        bio:
          type: string
        avatarUrl:
          type: string
        bannerUrl:
          type: string
        genre:
          type: string

    # ── Labels ──────────────────────────────────────────────────────────────
    Label:
      type: object
      required: [id, userId, name, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        bio:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        bannerUrl:
          type: ["string", "null"]
        followerCount:
          type: integer
        artistCount:
          type: integer
        isFollowed:
          type: boolean
        isVerified:
          type: boolean
        createdAt:
          type: string

    LabelProfile:
      allOf:
        - $ref: "#/components/schemas/Label"
