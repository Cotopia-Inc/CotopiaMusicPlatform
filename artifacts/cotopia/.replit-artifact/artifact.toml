kind = "web"
previewPath = "/"
title = "Cotopia"
version = "1.0.0"
id = "artifacts/cotopia"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23969

[services.development]
run = "pnpm --filter @workspace/cotopia run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cotopia", "run", "build" ]
publicDir = "artifacts/cotopia/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23969"
BASE_PATH = "/"
